<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    {% load static %}

    <link rel="icon" type="image/svg+xml" href="{% static 'catalogo/img/favicon.svg' %}">

    <link rel="stylesheet" href="{% static 'catalogo/css/style.css' %}">


</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                KAMPITO
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Categorías
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Ofertas</a></li>
                            <li><a class="dropdown-item" href="#">Sushi</a></li>
                            <li><a class="dropdown-item" href="#">Congelados</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Ver todo</a></li>
                        </ul>
                    </li>
                </ul>

                <form class="d-flex mx-auto w-50" action="#" method="GET">
                    <input class="form-control me-2" type="search" placeholder="Busca productos..." aria-label="Search">
                    <button class="btn btn-success" type="submit">Buscar</button>
                </form>

                <div class="d-flex align-items-center">
                    <a href="#" class="btn btn-outline-light position-relative">
                        <i class="bi bi-cart3"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            0
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-3 bg-light mt-auto border-top">
        <div class="container text-center">
            <span class="text-muted">© 2026 Kampito</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
