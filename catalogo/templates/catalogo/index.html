{% extends 'catalogo/base.html' %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Bienvenido a El Kampito</h1>
        <p class="col-md-8 fs-4">Selecciona tu sucursal para ver los productos disponibles en tu zona. Recuerda que puedes pedir online y pagar al recibir.</p>
        <button class="btn btn-primary btn-lg" type="button">Ver Catálogo</button>
    </div>
</div>

<div class="row">
    <h2 class="mb-4">Productos Destacados</h2>
    <div class="col-md-3 mb-4">
        <div class="card h-100">
            <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                Foto del Producto
            </div>
            <div class="card-body">
                <h5 class="card-title">Producto de Ejemplo</h5>
                <p class="card-text text-success fw-bold">$10.000</p>
                <button class="btn btn-sm btn-dark w-100">Agregar al Carrito</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
