{% extends 'catalogo/base.html' %}

{% load static %}{% block content %}

<!-- CARRUSEL -->
<div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    {% for banner in banners %}
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="{{ forloop.counter0 }}" 
              class="{% if forloop.first %}active{% endif %}" aria-label="Slide {{ forloop.counter }}"></button>
    {% endfor %}
  </div>

  <div class="carousel-inner shadow-sm rounded">
    {% for banner in banners %}
      <div class="carousel-item {% if forloop.first %}active{% endif %}">
        {% if banner.link %}
          <a href="{{ banner.link }}">
            <img src="{{ banner.imagen.url }}" class="d-block w-100" alt="{{ banner.titulo }}">
          </a>
        {% else %}
          <img src="{{ banner.imagen.url }}" class="d-block w-100" alt="{{ banner.titulo }}">
        {% endif %}
      </div>
    {% empty %}
      <div class="carousel-item active">
        <img src="{% static 'catalogo/img/placeholder-banner.jpg' %}" class="d-block w-100" alt="Bienvenido">
      </div>
    {% endfor %}
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
  </button>
</div>

<!-- FIN CARRUSEL -->

<div class="row">
    <h2 class="mb-4">Productos Destacados</h2>
    <div class="col-md-3 mb-4">
        <div class="card h-100">
            <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                Foto del Producto
            </div>
            <div class="card-body">
                <h5 class="card-title">Producto de Ejemplo</h5>
                <p class="card-text text-success fw-bold">$10.000</p>
                <button class="btn btn-sm btn-dark w-100">Agregar al Carrito</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
